name: Lumen MVP CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest
      - name: Test
        run: pytest tests -q
      - name: Demo
        run: python examples/demo_full_loop.py
      - name: Generate E3 candidate package
        run: python scripts/generate_e3_receipt.py
      - name: Verify E3 candidate package
        run: python scripts/verify_e3_package.py
